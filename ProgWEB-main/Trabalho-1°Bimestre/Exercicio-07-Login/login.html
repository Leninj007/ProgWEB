<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Rockstar Games - Social Club Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body class="fundo-login">
    <div class="login-card">
        <h1>Entrar</h1>
        
        <form>
            <label for="usuario">E-mail ou Usuário:</label>
            <input type="text" id="usuario" name="usuario" class="campo-login" placeholder="Ex: lenin_dev" required>
            
            <label for="senha">Senha:</label>
            <input type="password" id="senha" name="senha" class="campo-login" placeholder="Sua senha" required>
            
            <button type="submit" class="btn-entrar">Iniciar Sessão</button>
        </form>
        
        <div class="opcoes-extras">
            <a href="#">Esqueceu a senha?</a> | <a href="#">Criar conta</a>
        </div>
    </div>
</body>
</html>
